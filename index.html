<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Basecamp | Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Environment -->
    <div class="jungle-bg">
        <!-- Parallax Leaves Layers -->
        <div class="leaf layer-back"></div>
        <div class="leaf layer-mid"></div>
        <div class="leaf layer-front"></div>
        
        <!-- Fireflies Particles -->
        <div id="fireflies"></div>
    </div>

    <!-- Main Campfire UI -->
    <div class="explorer-camp">
        
        <!-- Center Wooden Board / UI -->
        <div class="wooden-board">
            <div class="map-texture"></div>
            
            <div class="camp-header">
                <h2>Explorer's Guild</h2>
                <p>Basecamp Access Portal</p>
            </div>

            <!-- Custom Torn Paper Tabs -->
            <div class="path-tabs">
                <div class="tab-btn active" onclick="switchPath('login')">Returnees</div>
                <div class="tab-btn" onclick="switchPath('register')">New Recruits</div>
            </div>

            <div class="form-jungle-wrapper">
                <!-- Login (Returnees) -->
                <form id="loginForm" class="jungle-form active-form" onsubmit="enterWild(event)">
                    <div class="eco-input">
                        <label>Explorer Name</label>
                        <div class="input-wrap">
                            <i class="ri-user-location-line"></i>
                            <input type="text" placeholder="Who goes there?" required>
                        </div>
                    </div>
                    <div class="eco-input">
                        <label>Secret Rune (Password)</label>
                        <div class="input-wrap">
                            <i class="ri-ancient-gate-line"></i>
                            <input type="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="torch-btn">
                        <span>Ignite Torch <i class="ri-fire-fill"></i></span>
                        <div class="flame-effect"></div>
                    </button>
                    <a href="#" class="lost-path">Lost your map? (Recover Password)</a>
                </form>

                <!-- Register (New Recruits) -->
                <form id="registerForm" class="jungle-form" onsubmit="enterWild(event)">
                    <div class="eco-input">
                        <label>Full Explorer Title</label>
                        <div class="input-wrap">
                            <i class="ri-leaf-line"></i>
                            <input type="text" placeholder="E.g., Tarzan of the Apes" required>
                        </div>
                    </div>
                    <div class="eco-input">
                        <label>Carrier Pigeon (Email)</label>
                        <div class="input-wrap">
                            <i class="ri-mail-send-line"></i>
                            <input type="email" placeholder="wild@jungle.mail" required>
                        </div>
                    </div>
                    <div class="eco-input">
                        <label>Forge a Rune</label>
                        <div class="input-wrap">
                            <i class="ri-ancient-gate-line"></i>
                            <input type="password" placeholder="Create Secret Rune" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="torch-btn recruit-btn">
                        <span>Join the Tribe <i class="ri-footprint-line"></i></span>
                        <div class="flame-effect"></div>
                    </button>
                </form>
            </div>
            
            <!-- Hanging Vines Decor -->
            <div class="vine vine-1"></div>
            <div class="vine vine-2"></div>
        </div>

    </div>

    <!-- Jungle Entrance Transition -->
    <div class="bush-overlay" id="bushOverlay">
        <div class="left-bush"></div>
        <div class="right-bush"></div>
        <h1 class="welcome-wild">ENTERING THE WILD...</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
